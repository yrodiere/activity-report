# Application information
app.version=${project.version}
app.name=${project.name}

# Quarkus configuration
quarkus.banner.enabled=false
quarkus.log.level=WARN
quarkus.log.min-level=TRACE
quarkus.log.console.level=WARN
quarkus.log.console.format=%-5p %m%n

# Allow --trace to display traces for select packages
quarkus.log.category."activityreport".level=TRACE
quarkus.log.category."org.jboss.resteasy.reactive.client".level=TRACE
quarkus.log.category."io.quarkus.rest.client".level=TRACE

# Enable REST client request/response logging
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=0

# Config validation - allow unknown properties (system properties, etc.)
quarkus.config.mapping.validate-unknown=false

# Default AI configuration
ai.url=http://localhost:8000/v1
ai.model=auto
