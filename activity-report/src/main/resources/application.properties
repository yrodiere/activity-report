# Application information
app.version=${project.version}
app.name=${project.name}

# Quarkus configuration
quarkus.banner.enabled=false
quarkus.log.level=WARN
quarkus.log.console.level=WARN
quarkus.log.console.format=%-5p %m%n

# Config validation - allow unknown properties (system properties, etc.)
quarkus.config.mapping.validate-unknown=false

# Default AI configuration
ai.url=http://localhost:8000/v1
ai.model=auto
